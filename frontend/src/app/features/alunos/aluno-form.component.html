<div class="page-container">

  <mat-card class="form-card">

    <mat-card-header>
      <mat-card-title>Cadastro de Aluno</mat-card-title>
      <mat-card-subtitle>Preencha as informações abaixo</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>

      <form [formGroup]="alunoForm" (ngSubmit)="salvar()">

        <h3 class="section-title">Dados Pessoais</h3>

        <div class="form-grid">

          <mat-form-field appearance="outline">
            <mat-label>Nome</mat-label>
            <input matInput formControlName="nome">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Data de Nascimento</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="dataNascimento">
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>CPF</mat-label>
            <input matInput formControlName="cpf">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Gênero</mat-label>
            <mat-select formControlName="genero">
              <mat-option *ngFor="let g of generos" [value]="g">
                {{ g }}
              </mat-option>
            </mat-select>
          </mat-form-field>

        </div>

        <h3 class="section-title">Contato</h3>

        <div class="form-grid">

          <mat-form-field appearance="outline">
            <mat-label>Telefone</mat-label>
            <input matInput formControlName="telefone">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email">
          </mat-form-field>

        </div>

        <h3 class="section-title">Endereço</h3>

        <div formGroupName="endereco" class="form-grid">

          <mat-form-field appearance="outline">
            <mat-label>Rua</mat-label>
            <input matInput formControlName="rua">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Número</mat-label>
            <input matInput formControlName="numero">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Bairro</mat-label>
            <input matInput formControlName="bairro">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Cidade</mat-label>
            <input matInput formControlName="cidade">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Estado</mat-label>
            <input matInput formControlName="estado">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>CEP</mat-label>
            <input matInput formControlName="cep">
          </mat-form-field>

        </div>

        <div class="checkbox-container">
          <mat-checkbox formControlName="ativo">Ativo</mat-checkbox>
        </div>

        <div class="actions">
          <button mat-stroked-button type="button">Cancelar</button>
          <button mat-raised-button color="primary" type="submit">
            Salvar
          </button>
        </div>

      </form>

    </mat-card-content>

  </mat-card>

</div>
