<mat-sidenav-container class="sidenav-container">

  <mat-sidenav #drawer mode="side" class="sidenav" [opened]="false">

    <div class="menu-header">
      <h3>Menu</h3>
    </div>

    <mat-nav-list>
      <a mat-list-item [routerLink]="['/']">Início</a>
      <a mat-list-item [routerLink]="['/alunos']">Alunos</a>
      <a mat-list-item [routerLink]="['/avaliacao']">Avaliação</a>
      <a mat-list-item routerLink="/treinos">Treinos</a>
    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="toolbar">

      <button mat-icon-button (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <div class="search-container">
        <mat-form-field appearance="outline" class="search-field">
          <mat-icon matPrefix>search</mat-icon>
          <input matInput placeholder="Pesquisar...">
        </mat-form-field>
      </div>

      <div class="user-area" [matMenuTriggerFor]="userMenu">

        <mat-icon class="user-icon">account_circle</mat-icon>

        <div class="user-info">
          <span class="user-name">Lucas Amaral</span>
          <span class="company-name">Integra Move</span>
        </div>

        <mat-icon>expand_more</mat-icon>

      </div>

      <mat-menu #userMenu="matMenu">
        <button mat-menu-item routerLink="/perfil">
          <mat-icon>person</mat-icon>
          <span>Meu Perfil</span>
        </button>

        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sair</span>
        </button>
      </mat-menu>

    </mat-toolbar>

    <main class="content">
      <router-outlet></router-outlet>
    </main>

  </mat-sidenav-content>

</mat-sidenav-container>
